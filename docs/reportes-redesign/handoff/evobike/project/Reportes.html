  <style>
/* EvoFlow Green Edition — Kinetic Precision Verdant */
@import url("https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;700&display=swap");

:root {
  /* Primary */
  --p: #1b4332;
  --p-mid: #2d6a4f;
  --p-bright: #2ecc71;
  --p-container: #a8e6cf;
  --on-p: #ffffff;
  --on-p-container: #1b4332;

  /* Secondary */
  --sec: #52b788;
  --sec-container: #d8f3dc;
  --on-sec-container: #1b4332;

  /* Tertiary / Alerts */
  --ter: #e74c3c;
  --ter-container: #fdecea;
  --on-ter-container: #7b241c;
  --warn: #f39c12;
  --warn-container: #fef9e7;

  /* Surfaces */
  --surface: #f8fafa;
  --surf-low: #f0f7f4;
  --surf-lowest: #ffffff;
  --surf-high: #dcf0e8;
  --surf-highest: #c7e6d8;
  --surf-dim: #d0e8dc;
  --surf-bright: #fafffe;

  /* On-surface */
  --on-surf: #131b2e;
  --on-surf-var: #3d5247;
  --outline-var: #b2ccc0;

  --ghost-border: rgba(178, 204, 192, 0.15);
  --shadow: 0px 12px 32px -4px rgba(19, 27, 46, 0.06);

  /* Radius */
  --r-xs: 4px;
  --r-sm: 8px;
  --r-md: 12px;
  --r-lg: 16px;
  --r-xl: 24px;
  --r-full: 9999px;

  --font-display: "Space Grotesk", sans-serif;
  --font-body: "Inter", -apple-system, sans-serif;

  /* Density — overridden by tweaks */
  --density-row: 0.5625rem;
  --density-card: 1.5rem;
}

.dark {
  --p: #a5d0b9;
  --p-mid: #7ab89a;
  --p-bright: #2ecc71;
  --p-container: #1b4332;
  --on-p: #131313;
  --on-p-container: #a5d0b9;

  --sec: #52b788;
  --sec-container: #0d3320;
  --on-sec-container: #a5d0b9;

  --ter: #ff8080;
  --ter-container: #3d1515;
  --on-ter-container: #ffb3b1;
  --warn: #f5c842;
  --warn-container: #3d2e00;

  --surface: #131313;
  --surf-low: #1b1b1b;
  --surf-lowest: #222222;
  --surf-high: #2b2b2b;
  --surf-highest: #333333;
  --surf-dim: #181818;
  --surf-bright: #2b2b2b;

  --on-surf: #e8f0eb;
  --on-surf-var: #8fbfa0;
  --outline-var: #2d4a3a;
  --ghost-border: rgba(45, 74, 58, 0.30);

  --shadow: 0px 12px 32px -4px rgba(0, 0, 0, 0.4);
}

.density-compact {
  --density-row: 0.375rem;
  --density-card: 1.125rem;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: var(--font-body);
  background: var(--surface);
  color: var(--on-surf);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

#root { min-height: 100vh; }

button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
input, select, textarea { font-family: inherit; }

/* Velocity Gradient utility */
.velocity-gradient {
  background: linear-gradient(135deg, #1b4332 0%, #2ecc71 100%);
}

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb {
  background: var(--ghost-border);
  border-radius: 999px;
}
::-webkit-scrollbar-thumb:hover { background: var(--outline-var); }

/* Label style */
.label-md {
  font-size: 0.625rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--on-surf-var);
  font-family: var(--font-body);
}

.label-sm {
  font-size: 0.625rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-family: var(--font-body);
}

.display {
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: -0.02em;
}

.headline {
  font-family: var(--font-display);
  font-weight: 700;
  letter-spacing: -0.01em;
}

/* Chip base */
.chip {
  border-radius: 999px;
  padding: 0.2rem 0.65rem;
  font-size: 0.625rem;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  font-family: var(--font-body);
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  white-space: nowrap;
}

.chip--pos { background: var(--sec-container); color: var(--on-sec-container); }
.chip--warn { background: var(--warn-container); color: var(--warn); }
.chip--crit { background: var(--ter-container); color: var(--on-ter-container); }
.chip--nostock { background: var(--ter); color: #fff; }
.chip--neutral { background: var(--surf-high); color: var(--on-surf-var); }
.chip--primary { background: var(--p-container); color: var(--on-p-container); }

/* Card */
.card {
  background: var(--surf-lowest);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow);
  padding: var(--density-card);
  outline: 1px solid var(--ghost-border);
}

.card--dim { background: var(--surf-low); box-shadow: none; outline: none; }

/* Button */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  border-radius: var(--r-full);
  padding: 0.5rem 1rem;
  font-size: 0.8125rem;
  font-weight: 500;
  font-family: var(--font-body);
  transition: transform 120ms ease, background 120ms ease, box-shadow 120ms ease;
  white-space: nowrap;
  user-select: none;
}

.btn:active { transform: translateY(1px); }

.btn--primary {
  background: linear-gradient(135deg, #1b4332, #2ecc71);
  color: #fff;
  font-weight: 600;
}

.btn--secondary {
  background: var(--surf-high);
  color: var(--p);
}

.btn--ghost {
  background: transparent;
  color: var(--p);
  border: 1.5px solid var(--p-mid);
}

.btn--sm { padding: 0.35rem 0.7rem; font-size: 0.75rem; }
.btn--icon { padding: 0.45rem; border-radius: var(--r-md); }
.btn--icon:hover { background: var(--surf-high); }

/* Input */
.input {
  background: var(--surf-lowest);
  outline: 1px solid var(--ghost-border);
  border-radius: var(--r-md);
  color: var(--on-surf);
  font-family: var(--font-body);
  font-size: 0.8125rem;
  padding: 0.5rem 0.75rem;
  border: none;
  transition: outline 120ms ease;
  width: 100%;
}
.input:focus { outline: 2px solid var(--p-bright); }

/* Segmented */
.segmented {
  display: inline-flex;
  background: var(--surf-high);
  border-radius: var(--r-full);
  padding: 3px;
  gap: 2px;
}
.segmented__btn {
  border-radius: var(--r-full);
  padding: 0.35rem 0.85rem;
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--on-surf-var);
  transition: all 120ms ease;
}
.segmented__btn--active {
  background: linear-gradient(135deg, #1b4332, #2ecc71);
  color: #fff;
  font-weight: 600;
}

/* Table */
.tbl {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
}
.tbl th {
  font-size: 0.6875rem;
  font-weight: 500;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  color: var(--on-surf-var);
  padding: 0.55rem 0.75rem;
  text-align: left;
  border-bottom: 1px solid var(--ghost-border);
  background: transparent;
  position: sticky;
  top: 0;
  z-index: 1;
}
.tbl td {
  font-size: 0.8125rem;
  color: var(--on-surf);
  padding: var(--density-row) 0.75rem;
}
.tbl tr:hover td { background: var(--surf-high); }
.tbl tr:hover td:first-child { border-radius: var(--r-sm) 0 0 var(--r-sm); }
.tbl tr:hover td:last-child { border-radius: 0 var(--r-sm) var(--r-sm) 0; }

/* Mini-spark safety */
svg { display: block; }

/* Fade */
@keyframes fadein {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
.fade-in { animation: fadein 240ms ease-out; }

/* Tooltip */
.tt {
  position: absolute;
  background: var(--surf-bright);
  color: var(--on-surf);
  padding: 0.4rem 0.65rem;
  border-radius: var(--r-sm);
  font-size: 0.6875rem;
  pointer-events: none;
  z-index: 40;
  white-space: nowrap;
  outline: 1px solid var(--ghost-border);
  box-shadow: var(--shadow);
  font-weight: 500;
}

/* KPI highlight card with gradient */
.kpi-hero {
  background: linear-gradient(135deg, #1b4332, #2ecc71);
  color: #ffffff;
  border-radius: var(--r-lg);
  padding: var(--density-card);
  position: relative;
  overflow: hidden;
  outline: none;
}
.kpi-hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background:
    radial-gradient(ellipse at top right, rgba(255,255,255,0.18), transparent 60%);
  pointer-events: none;
}

/* Focus ring */
:focus-visible { outline: 2px solid var(--p-bright); outline-offset: 2px; border-radius: var(--r-sm); }

  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <script>
// Mock data for Evobike reportes
// Retail pequeño-mediano: 2 sucursales (LEO, AV135), ~2,600 SKUs, 30-60 ventas/mes/sucursal

const BRANCHES = [
  { id: "leo", name: "LEO", color: "#2ECC71", full: "Sucursal LEO" },
  { id: "av135", name: "AV135", color: "#52B788", full: "Sucursal AV135" },
];

// MTD: Abril 2026 (1-18)
const DAYS_IN_PERIOD = 18;

// Deterministic pseudo-random for reproducibility
function seeded(seed) {
  let s = seed;
  return () => {
    s = (s * 9301 + 49297) % 233280;
    return s / 233280;
  };
}

const rng = seeded(42);

// Daily sales per branch (MXN)
const dailySales = Array.from({ length: DAYS_IN_PERIOD }, (_, i) => {
  const day = i + 1;
  const weekend = (day % 7 === 6 || day % 7 === 0);
  const leoBase = weekend ? 38000 : 22000;
  const av135Base = weekend ? 31000 : 18500;
  const leo = Math.round(leoBase + (rng() - 0.4) * 14000);
  const av135 = Math.round(av135Base + (rng() - 0.4) * 12000);
  return {
    day,
    date: `2026-04-${String(day).padStart(2, "0")}`,
    leo: Math.max(8000, leo),
    av135: Math.max(6000, av135),
    total: 0, // filled below
  };
}).map(d => ({ ...d, total: d.leo + d.av135 }));

// Previous period (march MTD equivalent, days 1-18)
const dailySalesPrev = Array.from({ length: DAYS_IN_PERIOD }, (_, i) => {
  const day = i + 1;
  const weekend = (day % 7 === 6 || day % 7 === 0);
  const leoBase = weekend ? 33000 : 19500;
  const av135Base = weekend ? 27000 : 16000;
  const leo = Math.round(leoBase + (rng() - 0.4) * 11000);
  const av135 = Math.round(av135Base + (rng() - 0.4) * 9500);
  return {
    day,
    leo: Math.max(7000, leo),
    av135: Math.max(5500, av135),
    total: 0,
  };
}).map(d => ({ ...d, total: d.leo + d.av135 }));

const sumNet = dailySales.reduce((s, d) => s + d.total, 0);
const sumNetPrev = dailySalesPrev.reduce((s, d) => s + d.total, 0);

// ~38% blended gross margin
const grossMargin = Math.round(sumNet * 0.381);
const grossMarginPrev = Math.round(sumNetPrev * 0.362);

// KPI data
const KPIS = {
  ventasNetas: {
    id: "ventasNetas",
    label: "Ventas netas",
    value: sumNet,
    format: "currency",
    prev: sumNetPrev,
    delta: (sumNet - sumNetPrev) / sumNetPrev,
    sub: "MTD · abril vs. marzo",
    series: dailySales.map(d => ({ x: d.day, y: d.total })),
    hero: true,
  },
  margenBruto: {
    id: "margenBruto",
    label: "Margen bruto",
    value: grossMargin,
    format: "currency",
    prev: grossMarginPrev,
    delta: (grossMargin - grossMarginPrev) / grossMarginPrev,
    pct: grossMargin / sumNet,
    sub: `${((grossMargin / sumNet) * 100).toFixed(1)}% margen blended`,
    series: dailySales.map(d => ({ x: d.day, y: Math.round(d.total * 0.381) })),
  },
  cxc: {
    id: "cxc",
    label: "Cuentas por cobrar",
    value: 147850,
    format: "currency",
    prev: 131200,
    delta: 0.127,
    sub: "23 apartados · 4 próximos a vencer",
    series: [
      { x: 1, y: 131200 }, { x: 5, y: 136400 }, { x: 10, y: 140500 },
      { x: 14, y: 144200 }, { x: 18, y: 147850 },
    ],
    warning: true,
  },
  cxp: {
    id: "cxp",
    label: "Cuentas por pagar",
    value: 223400,
    format: "currency",
    prev: 198700,
    delta: 0.124,
    sub: "9 facturas · 2 vencidas ($48,200)",
    series: [
      { x: 1, y: 198700 }, { x: 5, y: 205100 }, { x: 10, y: 212900 },
      { x: 14, y: 218500 }, { x: 18, y: 223400 },
    ],
    critical: true,
    splits: [
      { label: "Vencidas", value: 48200, color: "ter" },
      { label: "0–7 días", value: 62800, color: "warn" },
      { label: "8–30 días", value: 112400, color: "sec" },
    ],
  },
  stockCritico: {
    id: "stockCritico",
    label: "Stock crítico",
    value: 47,
    format: "count",
    prev: 38,
    delta: 0.237,
    sub: "LEO: 28 · AV135: 19",
    series: [
      { x: 1, y: 38 }, { x: 5, y: 41 }, { x: 10, y: 44 },
      { x: 14, y: 46 }, { x: 18, y: 47 },
    ],
    critical: true,
  },
};

// Recent sales (last N for detail table)
const VEHICLES = [
  "VOTES ROJO / AZUL 48V", "VOTES GRIS / AMARILLO 48V", "VOTES NARANJA 48V",
  "SOL AZUL CIELO 48V", "SOL NEGRO 48V", "SOL VERDE 48V",
  "KINETIC PRO 72V", "KINETIC URBAN 48V", "KINETIC LITE 36V",
  "SCOOT MX-1 48V", "SCOOT MX-2 60V", "EVO CARGO 60V",
];
const CUSTOMERS = [
  "María Pérez", "Juan Canul", "Sofía Ramírez", "Carlos Dzul", "Laura Chan",
  "Miguel Uc", "Andrea Pool", "Roberto May", "Fernanda Euán", "Diego Cetina",
  "Valentina Tec", "Ricardo Balam", "Alejandra Koh", "Héctor Cámara",
];
const SELLERS = ["A. Gómez", "R. Tzuc", "M. Canché", "L. Huchim", "D. Interián"];
const STATUSES = ["COMPLETED", "COMPLETED", "COMPLETED", "COMPLETED", "LAYAWAY", "COMPLETED", "REFUNDED"];

function genSales(n) {
  const out = [];
  const TIPOS = ["Producto", "Producto", "Producto", "Producto", "Servicio", "Servicio", "Montaje"];
  const METODOS = ["Efectivo", "Tarjeta", "Transferencia", "ATRATO"];
  for (let i = 0; i < n; i++) {
    const day = Math.floor(rng() * DAYS_IN_PERIOD) + 1;
    const vehicle = VEHICLES[Math.floor(rng() * VEHICLES.length)];
    const tipo = TIPOS[Math.floor(rng() * TIPOS.length)];
    const basePrice = tipo === "Servicio" ? 400 + Math.floor(rng() * 2600) : tipo === "Montaje" ? 1200 + Math.floor(rng() * 3800) : 14000 + Math.floor(rng() * 42000);
    const branch = rng() > 0.48 ? "LEO" : "AV135";
    const status = STATUSES[Math.floor(rng() * STATUSES.length)];
    const payment = METODOS[Math.floor(rng() * METODOS.length)];
    const folio = tipo === "Servicio" || tipo === "Montaje" ? `OT-${String(4100 + i).padStart(5, "0")}` : `V-${String(3480 + i).padStart(5, "0")}`;
    const marginPct = tipo === "Producto" ? 0.30 + rng() * 0.14 : tipo === "Servicio" ? 0.52 + rng() * 0.18 : 0.40 + rng() * 0.20;
    out.push({
      id: folio,
      folio,
      date: `2026-04-${String(day).padStart(2, "0")}`,
      customer: CUSTOMERS[Math.floor(rng() * CUSTOMERS.length)],
      product: tipo === "Servicio" ? "Afinación general + revisión sistema" : tipo === "Montaje" ? `Montaje accesorios · ${vehicle.split(" ")[0]}` : vehicle,
      branch,
      seller: SELLERS[Math.floor(rng() * SELLERS.length)],
      tipo,
      total: basePrice,
      margin: Math.round(basePrice * marginPct),
      status,
      payment,
    });
  }
  return out.sort((a, b) => b.date.localeCompare(a.date) || b.id.localeCompare(a.id));
}

const SALES = genSales(240);

// Top products
const TOP_PRODUCTS = [
  { name: "VOTES ROJO / AZUL 48V", units: 14, revenue: 498000, margin: 0.38 },
  { name: "SOL NEGRO 48V", units: 11, revenue: 362000, margin: 0.41 },
  { name: "KINETIC URBAN 48V", units: 9, revenue: 328500, margin: 0.35 },
  { name: "SOL AZUL CIELO 48V", units: 8, revenue: 284200, margin: 0.40 },
  { name: "VOTES GRIS / AMARILLO 48V", units: 7, revenue: 241800, margin: 0.37 },
  { name: "SCOOT MX-1 48V", units: 6, revenue: 192000, margin: 0.33 },
];

// Low stock items
const LOW_STOCK = [
  { sku: "BAT-48V-20AH-LI", name: "Batería Litio 48V 20Ah", branch: "LEO", stock: 1, min: 5, cat: "Batería" },
  { sku: "VOTES-RA-48V", name: "VOTES ROJO / AZUL 48V", branch: "LEO", stock: 0, min: 3, cat: "Vehículo" },
  { sku: "VOTES-GA-48V", name: "VOTES GRIS / AMARILLO 48V", branch: "AV135", stock: 1, min: 3, cat: "Vehículo" },
  { sku: "REF-CNT-36V", name: "Controlador 36V 350W", branch: "LEO", stock: 2, min: 6, cat: "Refacción" },
  { sku: "SOL-AC-48V", name: "SOL AZUL CIELO 48V", branch: "AV135", stock: 0, min: 2, cat: "Vehículo" },
  { sku: "REF-LLA-26", name: "Llanta 26x2.125", branch: "LEO", stock: 3, min: 12, cat: "Refacción" },
  { sku: "ACC-CAS-NEG", name: "Casco urbano negro", branch: "AV135", stock: 2, min: 8, cat: "Accesorio" },
  { sku: "BAT-36V-12AH", name: "Batería Litio 36V 12Ah", branch: "LEO", stock: 1, min: 4, cat: "Batería" },
];

// Branch comparison
const BRANCH_COMPARISON = [
  {
    id: "leo",
    name: "Sucursal LEO",
    sales: dailySales.reduce((s, d) => s + d.leo, 0),
    prev: dailySalesPrev.reduce((s, d) => s + d.leo, 0),
    units: 38,
    ticket: 0,
    margin: 0.389,
  },
  {
    id: "av135",
    name: "Sucursal AV135",

    prev: dailySalesPrev.reduce((s, d) => s + d.av135, 0),
    units: 31,
    ticket: 0,
    margin: 0.374,
  },
].map(b => ({ ...b, ticket: Math.round(b.sales / b.units), delta: (b.sales - b.prev) / b.prev }));

// Reports available
const REPORTS_CATALOG = [
  { id: "ventas", group: "Ventas", title: "Ventas e ingresos", desc: "Tickets emitidos, ingreso neto, ticket ø y método de pago.", icon: "sales", updated: "Hace 2 min", items: 240, pinned: true },
  { id: "margen", group: "Ventas", title: "Margen bruto por producto", desc: "Revenue neto / 1.16 − costo resuelto. Drill a SKU.", icon: "margin", updated: "Hace 2 min", items: 48, pinned: true },
  { id: "comisiones", group: "Ventas", title: "Comisiones por vendedor", desc: "Acumulado del período, split por sucursal.", icon: "commission", updated: "Hoy 10:42", items: 5 },
  { id: "apartados", group: "Clientes", title: "Apartados / LAYAWAY", desc: "Saldos pendientes, antigüedad y recordatorios.", icon: "layaway", updated: "Hace 8 min", items: 23, pinned: true },
  { id: "retencion", group: "Clientes", title: "Retención y recompra", desc: "Clientes recurrentes, cohortes, NPS estimado.", icon: "retention", updated: "Ayer", items: 312 },
  { id: "taller", group: "Taller", title: "Mantenimiento y fallas", desc: "OTs activas, tiempo promedio, fallas recurrentes.", icon: "wrench", updated: "Hace 12 min", items: 18, pinned: true },

const fmtMXN = (n, { compact = false } = {}) => {
  if (n == null) return "—";
  if (compact && Math.abs(n) >= 1000) {
    if (Math.abs(n) >= 1_000_000) return `$${(n/1_000_000).toFixed(2)}M`;
    return `$${(n/1000).toFixed(1)}k`;
  }
  return new Intl.NumberFormat("es-MX", { style: "currency", currency: "MXN", maximumFractionDigits: 0 }).format(n);
};
const fmtPct = (n, digits = 1) => `${(n * 100).toFixed(digits)}%`;
const fmtDelta = (n) => `${n >= 0 ? "+" : ""}${(n * 100).toFixed(1)}%`;
const fmtNum = (n) => n == null ? "—" : new Intl.NumberFormat("es-MX").format(n);
const fmtDate = (d) => {
  const [y, m, day] = d.split("-");
  const months = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  return `${parseInt(day)} ${months[parseInt(m)-1]}`;
};

// Chip
const Chip = ({ kind = "neutral", children, dot = false }) => (
  <span className={`chip chip--${kind}`}>
    {dot && <span style={{ width: 6, height: 6, borderRadius: 999, background: "currentColor", opacity: 0.8 }} />}
    {children}
  </span>
);

// Delta pill
const Delta = ({ value, inverse = false, compact = false }) => {
  const positive = inverse ? value < 0 : value > 0;
  const color = value === 0 ? "var(--on-surf-var)" : positive ? "var(--sec)" : "var(--ter)";
  return (
    <span style={{
      display: "inline-flex", alignItems: "center", gap: "0.2rem",
      fontSize: compact ? "0.6875rem" : "0.75rem", fontWeight: 600, color, fontVariantNumeric: "tabular-nums",
    }}>
      <Icon name={value >= 0 ? "arrowUp" : "arrowDown"} size={compact ? 10 : 12} stroke={2.25} />
      {fmtDelta(Math.abs(value))}
    </span>
  );
};

Object.assign(window, { fmtMXN, fmtPct, fmtDelta, fmtNum, fmtDate, Icon, Logo, Chip, Delta });


// ==== src/charts.jsx ====
// SVG chart primitives — line, area, bar, sparkline, donut
// All respect --p, --p-bright, --sec, --ter via theme tokens

const ChartAxis = ({ width, height, padding, xDomain, yDomain, xTicks = 6, yTicks = 4 }) => {
  const [yMin, yMax] = yDomain;
  const [xMin, xMax] = xDomain;
  const yStep = (yMax - yMin) / yTicks;
  return (
    <g>
      {Array.from({ length: yTicks + 1 }, (_, i) => {
        const v = yMin + yStep * i;
        const y = height - padding.bottom - (i / yTicks) * (height - padding.top - padding.bottom);
        return (
          <g key={i}>
            <line x1={padding.left} x2={width - padding.right} y1={y} y2={y}
                  stroke="var(--ghost-border)" strokeDasharray={i === 0 ? "0" : "3 4"} />
            <text x={padding.left - 8} y={y + 4} textAnchor="end"
                  fill="var(--on-surf-var)" fontSize="10" fontFamily="var(--font-body)">
              {v >= 1000 ? `${Math.round(v/1000)}k` : Math.round(v)}
            </text>
          </g>
        );
      })}
    </g>
  );
};

const LineArea = ({ data, width = 600, height = 240, color = "var(--p-bright)", fill = true,
                   compareData = null, yFormat = "k", xLabels = null }) => {
  const padding = { top: 16, right: 16, bottom: 28, left: 40 };
  const xs = data.map(d => d.x);
  const ys = [...data, ...(compareData || [])].map(d => d.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMax = Math.max(...ys) * 1.1;
  const yMin = 0;

  const toX = x => padding.left + ((x - xMin) / (xMax - xMin || 1)) * (width - padding.left - padding.right);
  const toY = y => height - padding.bottom - ((y - yMin) / (yMax - yMin || 1)) * (height - padding.top - padding.bottom);

  const linePath = data.map((d, i) => `${i ? "L" : "M"}${toX(d.x)},${toY(d.y)}`).join(" ");
  const areaPath = `${linePath} L${toX(data[data.length-1].x)},${toY(0)} L${toX(data[0].x)},${toY(0)} Z`;

  const comparePath = compareData
    ? compareData.map((d, i) => `${i ? "L" : "M"}${toX(d.x)},${toY(d.y)}`).join(" ")
    : null;

  const [hover, setHover] = React.useState(null);
  const svgRef = React.useRef(null);

  const handleMove = (e) => {
    if (!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const mx = ((e.clientX - rect.left) / rect.width) * width;
    if (mx < padding.left || mx > width - padding.right) { setHover(null); return; }
    const dataX = xMin + ((mx - padding.left) / (width - padding.left - padding.right)) * (xMax - xMin);
    let nearest = data[0], best = Infinity;
    for (const d of data) {
      const dist = Math.abs(d.x - dataX);
      if (dist < best) { best = dist; nearest = d; }
    }
    const cmp = compareData ? compareData.find(d => d.x === nearest.x) : null;
    setHover({ d: nearest, cmp });
  };

  return (
    <div style={{ position: "relative", width: "100%" }}>
      <svg ref={svgRef} viewBox={`0 0 ${width} ${height}`} style={{ width: "100%", height: "auto", display: "block" }}
           onMouseMove={handleMove} onMouseLeave={() => setHover(null)}>
        <defs>
          <linearGradient id="areaFill" x1="0" x2="0" y1="0" y2="1">
            <stop offset="0%" stopColor="#2ECC71" stopOpacity="0.25" />
            <stop offset="100%" stopColor="#2ECC71" stopOpacity="0" />
          </linearGradient>
        </defs>
        <ChartAxis width={width} height={height} padding={padding} xDomain={[xMin, xMax]} yDomain={[yMin, yMax]} />
        {/* x labels */}
        {data.map((d, i) => (i % 3 === 0 || i === data.length - 1) && (
          <text key={i} x={toX(d.x)} y={height - 8} textAnchor="middle"
                fill="var(--on-surf-var)" fontSize="10" fontFamily="var(--font-body)">
            {xLabels ? xLabels[i] : d.x}
          </text>
        ))}
        {compareData && (
          <path d={comparePath} fill="none" stroke="var(--on-surf-var)" strokeWidth="1.5"
                strokeDasharray="4 4" opacity="0.55" />
        )}
        {fill && <path d={areaPath} fill="url(#areaFill)" />}
        <path d={linePath} fill="none" stroke={color} strokeWidth="2" strokeLinejoin="round" strokeLinecap="round" />
        {hover && (
          <>
            <line x1={toX(hover.d.x)} x2={toX(hover.d.x)} y1={padding.top} y2={height - padding.bottom}
                  stroke="var(--p-bright)" strokeDasharray="3 3" opacity="0.6" />
            <circle cx={toX(hover.d.x)} cy={toY(hover.d.y)} r="5" fill={color} stroke="var(--surf-lowest)" strokeWidth="2" />
            {hover.cmp && (
              <circle cx={toX(hover.cmp.x)} cy={toY(hover.cmp.y)} r="4" fill="var(--on-surf-var)"
                      stroke="var(--surf-lowest)" strokeWidth="2" opacity="0.7" />
            )}
          </>
        )}
      </svg>
      {hover && (
        <div className="tt" style={{
          left: `${(toX(hover.d.x) / width) * 100}%`,
          top: 8, transform: "translateX(-50%)",
        }}>
          <div style={{ fontWeight: 600, marginBottom: 2 }}>Día {hover.d.x}</div>
          <div style={{ color: color, fontVariantNumeric: "tabular-nums" }}>
            {fmtMXN(hover.d.y, { compact: true })}
          </div>
          {hover.cmp && (
            <div style={{ color: "var(--on-surf-var)", fontSize: "0.625rem", fontVariantNumeric: "tabular-nums" }}>
              Prev: {fmtMXN(hover.cmp.y, { compact: true })}
            </div>
          )}
        </div>
      )}
    </div>
  );
};

const BarStack = ({ data, width = 600, height = 240, keys = [{key: "leo", color: "#2ECC71", label: "LEO"}, {key: "av135", color: "#52B788", label: "AV135"}] }) => {
  const padding = { top: 16, right: 16, bottom: 28, left: 40 };
  const yMax = Math.max(...data.map(d => keys.reduce((s, k) => s + d[k.key], 0))) * 1.1;
  const bw = (width - padding.left - padding.right) / data.length * 0.7;
  const gap = (width - padding.left - padding.right) / data.length * 0.3;
  const [hover, setHover] = React.useState(null);
  const toY = y => height - padding.bottom - (y / yMax) * (height - padding.top - padding.bottom);

  return (
    <div style={{ position: "relative", width: "100%" }}>
      <svg viewBox={`0 0 ${width} ${height}`} style={{ width: "100%", height: "auto", display: "block" }}>
        <ChartAxis width={width} height={height} padding={padding} xDomain={[0, data.length]} yDomain={[0, yMax]} />
        {data.map((d, i) => {
          const x = padding.left + (bw + gap) * i + gap / 2;
          let yStack = 0;
          return (
            <g key={i} onMouseEnter={() => setHover({ d, i })} onMouseLeave={() => setHover(null)}>
              {keys.map(k => {
                const h = (d[k.key] / yMax) * (height - padding.top - padding.bottom);
                const y = toY(yStack + d[k.key]);
                yStack += d[k.key];
                return <rect key={k.key} x={x} y={y} width={bw} height={h} fill={k.color}
                             rx="2" opacity={hover && hover.i !== i ? 0.4 : 1}
                             style={{ transition: "opacity 120ms" }} />;
              })}
              {(i % 3 === 0 || i === data.length - 1) && (
                <text x={x + bw / 2} y={height - 8} textAnchor="middle"
                      fill="var(--on-surf-var)" fontSize="10" fontFamily="var(--font-body)">
                  {d.day || d.x}
                </text>
              )}
            </g>
          );
        })}
      </svg>
      {hover && (
        <div className="tt" style={{
          left: `${((padding.left + (bw + gap) * hover.i + gap / 2 + bw / 2) / width) * 100}%`,
          top: 8, transform: "translateX(-50%)",
        }}>
          <div style={{ fontWeight: 600, marginBottom: 2 }}>Día {hover.d.day || hover.d.x}</div>
          {keys.map(k => (
            <div key={k.key} style={{ display: "flex", gap: 8, justifyContent: "space-between", fontVariantNumeric: "tabular-nums" }}>
              <span style={{ color: k.color }}>● {k.label}</span>
              <span>{fmtMXN(hover.d[k.key], { compact: true })}</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};

const Sparkline = ({ data, color = "var(--p-bright)", width = 120, height = 36, fill = true }) => {
  const xs = data.map(d => d.x), ys = data.map(d => d.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  const toX = x => ((x - xMin) / (xMax - xMin || 1)) * width;
  const toY = y => height - 2 - ((y - yMin) / (yMax - yMin || 1)) * (height - 4);
  const linePath = data.map((d, i) => `${i ? "L" : "M"}${toX(d.x)},${toY(d.y)}`).join(" ");
  const areaPath = `${linePath} L${toX(xMax)},${height} L${toX(xMin)},${height} Z`;
  const gradId = `sg-${Math.random().toString(36).slice(2, 8)}`;
  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{ width: "100%", height: height, display: "block" }} preserveAspectRatio="none">
      <defs>
        <linearGradient id={gradId} x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stopColor={color.startsWith("var") ? "#2ECC71" : color} stopOpacity="0.3" />
          <stop offset="100%" stopColor={color.startsWith("var") ? "#2ECC71" : color} stopOpacity="0" />
        </linearGradient>
      </defs>
      {fill && <path d={areaPath} fill={`url(#${gradId})`} />}
      <path d={linePath} fill="none" stroke={color} strokeWidth="1.75" strokeLinejoin="round" strokeLinecap="round" />
    </svg>
  );
};

const SparkBars = ({ data, color = "var(--p-bright)", width = 120, height = 36 }) => {
  const yMax = Math.max(...data.map(d => d.y));
  const bw = width / data.length * 0.7;
  const gap = width / data.length * 0.3;
  return (
    <svg viewBox={`0 0 ${width} ${height}`} style={{ width: "100%", height, display: "block" }} preserveAspectRatio="none">
      {data.map((d, i) => {
        const h = (d.y / yMax) * (height - 2);
        return <rect key={i} x={i * (bw + gap)} y={height - h} width={bw} height={h} fill={color} rx="1" opacity={0.85} />;
      })}
    </svg>
  );
};

const Donut = ({ value, total, size = 88, thickness = 10, color = "var(--p-bright)" }) => {
  const r = (size - thickness) / 2;
  const c = 2 * Math.PI * r;
  const pct = value / total;
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--surf-high)" strokeWidth={thickness} />
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={thickness}
              strokeDasharray={`${c * pct} ${c}`} strokeLinecap="round"
              transform={`rotate(-90 ${size/2} ${size/2})`} />
    </svg>
  );
};

const ProgressSplit = ({ splits, total }) => {
  const colors = { ter: "var(--ter)", warn: "var(--warn)", sec: "var(--sec)", p: "var(--p-bright)" };
  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "0.4rem", width: "100%" }}>
      <div style={{ display: "flex", height: 6, borderRadius: 999, overflow: "hidden", background: "var(--surf-high)" }}>
        {splits.map((s, i) => (
          <div key={i} style={{ width: `${(s.value / total) * 100}%`, background: colors[s.color] }} />
        ))}
      </div>
      <div style={{ display: "flex", justifyContent: "space-between", gap: "0.5rem" }}>
        {splits.map((s, i) => (
          <div key={i} style={{ display: "flex", flexDirection: "column", gap: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
              <span style={{ width: 6, height: 6, borderRadius: 999, background: colors[s.color] }} />
              <span style={{ fontSize: "0.625rem", color: "var(--on-surf-var)", textTransform: "uppercase", letterSpacing: "0.04em", fontWeight: 500 }}>{s.label}</span>
            </div>
            <span style={{ fontSize: "0.75rem", fontWeight: 600, fontVariantNumeric: "tabular-nums" }}>{fmtMXN(s.value, { compact: true })}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

        <span style={{ fontSize: "0.6875rem", color: "var(--on-surf-var)" }}>{kpi.sub}</span>
      </div>
      <div style={{ marginTop: "auto", paddingTop: "0.6rem", height: 36, marginLeft: -6, marginRight: -6 }}>
        {kpi.splits
          ? <ProgressSplit splits={kpi.splits} total={kpi.value} />
          : <SparkEl data={kpi.series} color={color} height={36} />}
      </div>
    </div>
  );
};

const HeroBand = ({ kpiOrder, kpiVisibility, chartDefault, variant }) => {
  const kpis = kpiOrder.filter(id => kpiVisibility[id] !== false).map(id => EVOBIKE_DATA.KPIS[id]);
  const [hero, ...rest] = kpis;

  if (variant === "mercury") {
    // Modular — hero full-width + 4 KPIs en banda horizontal debajo
    return (
      <div style={{ display: "flex", flexDirection: "column", gap: "1rem", padding: "0 1.5rem" }}>
        {hero && (
          <div style={{ display: "grid", gridTemplateColumns: "1fr" }}>
            <KPICardEditorial kpi={hero} hero chart={chartDefault} />
          </div>
        )}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", gap: "1rem" }}>
          {rest.slice(0, 4).map(k => <KPICardEditorial key={k.id} kpi={k} chart={chartDefault} />)}
        </div>
      </div>
    );
  }

  if (variant === "stripe") {
    // Financial — no hero, 5-col equal, numbers-first
    return (
      <div style={{ display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "0.75rem", padding: "0 1.5rem" }}>
        {kpis.slice(0, 5).map((k, i) => (
          <div key={k.id} className="card fade-in" style={{ display: "flex", flexDirection: "column", gap: "0.4rem", padding: "1.25rem", background: i === 0 ? "var(--surf-low)" : "var(--surf-lowest)" }}>
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
              <span className="label-md" style={{ fontSize: "0.5625rem" }}>{k.label}</span>
              <Delta value={k.delta} inverse={k.critical || k.warning} compact />
            </div>
            <div className="display" style={{ fontSize: "1.6rem", lineHeight: 1.1, fontVariantNumeric: "tabular-nums" }}>
              {k.format === "count" ? fmtNum(k.value) : fmtMXN(k.value, { compact: true })}
            </div>
            <div style={{ fontSize: "0.6875rem", color: "var(--on-surf-var)" }}>{k.sub}</div>
            <div style={{ height: 28, marginTop: "0.4rem", marginLeft: -4, marginRight: -4 }}>
              <Sparkline data={k.series} color={k.critical ? "var(--ter)" : k.warning ? "var(--warn)" : "var(--p-bright)"} height={28} />
            </div>
          </div>
        ))}
      </div>
    );
  }

  // Editorial Dense (default) — hero + 4 compact
  return (
    <div style={{ display: "grid", gridTemplateColumns: "1.6fr 1fr 1fr 1fr 1fr", gap: "0.85rem", padding: "0 1.5rem" }}>
      {hero && <KPICardEditorial kpi={hero} hero chart={chartDefault} />}
      {rest.slice(0, 4).map(k => <KPICardEditorial key={k.id} kpi={k} chart={chartDefault} />)}
    </div>
  );
};

const TrendSection = ({ branch, chartDefault }) => {
  const data = EVOBIKE_DATA.dailySales;
  const prev = EVOBIKE_DATA.dailySalesPrev;
  const [view, setView] = React.useState(chartDefault === "bars" ? "bars" : "line");

  const branchData = branch === "all"
    ? data.map(d => ({ x: d.day, y: d.total, day: d.day, leo: d.leo, av135: d.av135 }))
    : data.map(d => ({ x: d.day, y: d[branch], day: d.day }));
  const prevData = compare && branch === "all"
    ? prev.map(d => ({ x: d.day, y: d.total }))
    : compare ? prev.map(d => ({ x: d.day, y: d[branch] })) : null;

  return (
    <div className="card" style={{ display: "flex", flexDirection: "column", gap: "1rem" }}>
      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", gap: "0.75rem", flexWrap: "wrap" }}>

            Diario · {branch === "all" ? "consolidado LEO + AV135" : `Sucursal ${branch.toUpperCase()}`} · {compare ? "vs. marzo" : "sin comparación"}
          </div>
        </div>
        <div style={{ display: "flex", gap: "0.4rem", alignItems: "center" }}>
          <button onClick={() => setCompare(!compare)} className="btn btn--sm"
            style={{ background: compare ? "var(--surf-high)" : "transparent", color: compare ? "var(--p)" : "var(--on-surf-var)" }}>
            <Icon name={compare ? "check" : "plus"} size={12} />
            Comparar
          </button>
          <div className="segmented">
            {[{k:"line", l:"Línea"},{k:"area",l:"Área"},{k:"bars", l:"Barras"}].map(o => (
              <button key={o.k} onClick={() => setView(o.k)}
                className={`segmented__btn ${view === o.k ? "segmented__btn--active" : ""}`}>{o.l}</button>
            ))}
          </div>
        </div>
      </div>
      <div style={{ minHeight: 240 }}>
        {view === "bars" && branch === "all"
          ? <BarStack data={branchData} height={260} />
          : <LineArea data={branchData} compareData={prevData} fill={view !== "line"} height={260} />}
      </div>
      <div style={{ display: "flex", gap: "1.25rem", flexWrap: "wrap", paddingTop: "0.5rem", borderTop: "1px solid var(--ghost-border)" }}>
        <div>
          <div className="label-md">Ticket promedio</div>

        </div>
        <div>
          <div className="label-md">Unidades vendidas</div>
          <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: "1.125rem", letterSpacing: "-0.01em", fontVariantNumeric: "tabular-nums" }}>69</div>
        </div>
        <div>
          <div className="label-md">Días activos</div>
          <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: "1.125rem", letterSpacing: "-0.01em", fontVariantNumeric: "tabular-nums" }}>18 / 18</div>

        <div>
          <div className="label-md">Mejor día</div>
          <div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: "1.125rem", letterSpacing: "-0.01em", fontVariantNumeric: "tabular-nums" }}>Dom 12 · {fmtMXN(Math.max(...data.map(d => d.total)), { compact: true })}</div>

// Shell común del nivel 3 de Reportes — usado por todos los reportes de Detalle
// Layout: breadcrumb ya viene del Topbar · H1 + acciones · filter panel · KPIs · viz principal · tabla

// ---- FilterPopover: UI real con popover multi-select ----
const FilterPopover = ({ label, options, selected, onChange, align = "left" }) => {
  const [open, setOpen] = React.useState(false);
  const ref = React.useRef(null);
  React.useEffect(() => {
    if (!open) return;
    const handler = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", handler);
    return () => document.removeEventListener("mousedown", handler);
  }, [open]);

  const all = selected.length === 0 || selected.length === options.length;
  const displayValue = all ? "Todos" : selected.length === 1 ? options.find(o => o.id === selected[0])?.label : `${selected.length} seleccionados`;

  const toggle = (id) => {
    if (selected.includes(id)) onChange(selected.filter(x => x !== id));
    else onChange([...selected, id]);
  };

  return (
    <div ref={ref} style={{ position: "relative" }}>
      <button onClick={() => setOpen(!open)}
        style={{
          display: "inline-flex", alignItems: "center", gap: "0.4rem",
          padding: "0.35rem 0.7rem 0.35rem 0.8rem", borderRadius: 999,
          fontSize: "0.75rem", fontWeight: 500, color: "var(--on-surf)",
          background: all ? "var(--surf-bright)" : "var(--p-container)",
          outline: all ? "1px solid var(--ghost-border)" : "1px solid color-mix(in srgb, var(--p) 40%, transparent)",
          transition: "all 120ms ease",
        }}>
        <span style={{ color: "var(--on-surf-var)", fontSize: "0.6875rem" }}>{label}</span>
        <span style={{ fontWeight: 600 }}>{displayValue}</span>
        <Icon name="chevronDown" size={12} style={{ opacity: 0.5 }} />
      </button>
      {open && (
        <div className="fade-in" style={{
          position: "absolute", top: "calc(100% + 6px)", [align]: 0,
          minWidth: 220, zIndex: 40,
          background: "color-mix(in srgb, var(--surf-bright) 94%, transparent)",
          backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
          boxShadow: "0 12px 40px rgba(0,0,0,0.18)",
          borderRadius: "var(--r-md)", outline: "1px solid var(--ghost-border)",
          padding: "0.5rem", display: "flex", flexDirection: "column", gap: 2,
        }}>
          <button onClick={() => onChange(options.map(o => o.id))}
            style={{ padding: "0.45rem 0.65rem", fontSize: "0.75rem", textAlign: "left", color: "var(--on-surf-var)", borderRadius: "var(--r-sm)" }}>
            <Icon name="check" size={12} /> Seleccionar todos
          </button>
          <button onClick={() => onChange([])}
            style={{ padding: "0.45rem 0.65rem", fontSize: "0.75rem", textAlign: "left", color: "var(--on-surf-var)", borderRadius: "var(--r-sm)" }}>
            Limpiar
          </button>
          <div style={{ height: 1, background: "var(--ghost-border)", margin: "4px 0" }} />
          {options.map(o => {
            const on = selected.includes(o.id);
            return (
              <button key={o.id} onClick={() => toggle(o.id)}
                style={{
                  display: "flex", alignItems: "center", gap: "0.55rem",
                  padding: "0.45rem 0.55rem", borderRadius: "var(--r-sm)",
                  fontSize: "0.8125rem", textAlign: "left",
                  background: on ? "var(--surf-high)" : "transparent",
                }}>
                <span style={{
                  width: 14, height: 14, borderRadius: 4,
                  background: on ? "var(--p-bright)" : "transparent",
                  outline: on ? "none" : "1.5px solid var(--on-surf-var)",
                  display: "grid", placeItems: "center", flexShrink: 0,
                }}>
                  {on && <Icon name="check" size={10} style={{ color: "#fff" }} stroke={3} />}
                </span>
                <span style={{ flex: 1 }}>{o.label}</span>
                {o.count != null && <span style={{ fontSize: "0.6875rem", color: "var(--on-surf-var)", fontVariantNumeric: "tabular-nums" }}>{o.count}</span>}
              </button>
            );
          })}
        </div>
      )}
    </div>
  );
};

        {badge && <Chip kind={badge.kind} dot>{badge.label}</Chip>}
      </div>
      <div className="display" style={{ fontSize: "1.75rem", lineHeight: 1.1, fontVariantNumeric: "tabular-nums", letterSpacing: "-0.015em" }}>{value}</div>
      <div style={{ display: "flex", alignItems: "center", gap: "0.5rem", minHeight: 18 }}>
        {noCompare
          ? <span style={{ fontSize: "0.6875rem", color: "var(--on-surf-var)" }}>— sin comparativo</span>
          : <><Delta value={delta} inverse={invertDelta} compact /><span style={{ fontSize: "0.6875rem", color: "var(--on-surf-var)" }}>{deltaLabel}</span></>
        }
      </div>
      {sparkData && (
        <div style={{ height: 28, marginLeft: -4, marginRight: -4, marginTop: "auto" }}>
          <Sparkline data={sparkData} color={sparkColor || "var(--p-bright)"} height={28} />
        </div>
      )}
    </div>
  );
};

// ==== src/report-v1-ventas.jsx ====
// V1 — Ventas e ingresos (spec §4, V1)
// Filtros: rango · sucursal · vendedor · método · tipo (multi-select popovers)
// KPIs: tickets · ingreso neto · ticket ø · unidades · crecimiento
// Viz: línea diaria/semanal/mensual + overlay stacked bars por método
// Tabla: tickets con drill modal

const ReporteV1Ventas = ({ onExport, onSave }) => {
  const SELLERS_LIST = [...new Set(EVOBIKE_DATA.SALES.map(s => s.seller))];
  const METHODS_LIST = [...new Set(EVOBIKE_DATA.SALES.map(s => s.payment))];
  const TYPES_LIST = [...new Set(EVOBIKE_DATA.SALES.map(s => s.tipo))];

  // Filters
  const [branches, setBranches] = React.useState([]);
  const [sellers, setSellers] = React.useState([]);
  const [methods, setMethods] = React.useState([]);
  const [types, setTypes] = React.useState([]);
  const [period, setPeriod] = React.useState("MTD");
  const [granularity, setGranularity] = React.useState("day"); // day · week · month
  const [selectedTicket, setSelectedTicket] = React.useState(null);
  const [focusedDay, setFocusedDay] = React.useState(null); // día pintado por click en gráfico
  const [sortBy, setSortBy] = React.useState("date");
  const [sortDir, setSortDir] = React.useState("desc");
  const [tableQuery, setTableQuery] = React.useState("");

  const dirty = branches.length + sellers.length + methods.length + types.length > 0 || period !== "MTD" || focusedDay !== null;

  const filtered = React.useMemo(() => EVOBIKE_DATA.SALES.filter(s => {
    if (s.status !== "COMPLETED") return false;
    if (branches.length && !branches.includes(s.branch)) return false;
    if (sellers.length && !sellers.includes(s.seller)) return false;
    if (methods.length && !methods.includes(s.payment)) return false;
    if (types.length && !types.includes(s.tipo)) return false;
    if (focusedDay != null) {
      const d = parseInt(s.date.split("-")[2], 10);
      if (d !== focusedDay) return false;
    }
    return true;
  }), [branches, sellers, methods, types, focusedDay]);

  // KPI aggregates
  const tickets = filtered.length;
  const ingresoNeto = Math.round(filtered.reduce((a, s) => a + s.total / 1.16, 0));
  const ticketPromedio = tickets ? Math.round(ingresoNeto / tickets) : 0;
  const unidades = filtered.filter(s => s.tipo === "Producto").length;
  const prevIngreso = Math.round(ingresoNeto * 0.884); // mock previous
  const crecimiento = prevIngreso ? (ingresoNeto - prevIngreso) / prevIngreso : null;

  // Daily series for chart
  const daily = React.useMemo(() => {
    const map = {};
    filtered.forEach(s => {
      const d = parseInt(s.date.split("-")[2], 10);
      if (!map[d]) map[d] = { day: d, total: 0, Efectivo: 0, Tarjeta: 0, Transferencia: 0, ATRATO: 0 };
      map[d].total += s.total / 1.16;
      map[d][s.payment] = (map[d][s.payment] || 0) + s.total / 1.16;
    });
    const arr = Array.from({ length: EVOBIKE_DATA.DAYS_IN_PERIOD }, (_, i) => {
      const day = i + 1;
      return map[day] || { day, total: 0, Efectivo: 0, Tarjeta: 0, Transferencia: 0, ATRATO: 0 };
    });
    return arr;
  }, [filtered]);

  // Week aggregation
  const weekly = React.useMemo(() => {
    const out = [];
    for (let i = 0; i < daily.length; i += 7) {
      const slice = daily.slice(i, i + 7);
      const total = slice.reduce((a, d) => a + d.total, 0);
      const e = slice.reduce((a, d) => a + d.Efectivo, 0);
      const t = slice.reduce((a, d) => a + d.Tarjeta, 0);
      const tr = slice.reduce((a, d) => a + d.Transferencia, 0);
      const at = slice.reduce((a, d) => a + d.ATRATO, 0);
      out.push({ day: `Sem ${Math.floor(i/7) + 1}`, total, Efectivo: e, Tarjeta: t, Transferencia: tr, ATRATO: at });
    }
    return out;
  }, [daily]);

  const chartData = granularity === "week" ? weekly : daily;

  // Table with search + sort
  const sortedRows = React.useMemo(() => {
    let rows = filtered;
    if (tableQuery) {
      const q = tableQuery.toLowerCase();
      rows = rows.filter(r => r.folio.toLowerCase().includes(q) || r.customer.toLowerCase().includes(q) || r.product.toLowerCase().includes(q));
    }
    return [...rows].sort((a, b) => {
      const m = sortDir === "desc" ? -1 : 1;
      if (sortBy === "total") return (a.total - b.total) * m;
      if (sortBy === "margin") return (a.margin - b.margin) * m;
      if (sortBy === "customer") return a.customer.localeCompare(b.customer) * m;
      return a.date.localeCompare(b.date) * m || a.folio.localeCompare(b.folio) * m;
    });
  }, [filtered, sortBy, sortDir, tableQuery]);

  const toggleSort = (col) => {
    if (sortBy === col) setSortDir(sortDir === "desc" ? "asc" : "desc");
    else { setSortBy(col); setSortDir("desc"); }
  };

  const clearAll = () => { setBranches([]); setSellers([]); setMethods([]); setTypes([]); setPeriod("MTD"); setFocusedDay(null); };

  const branchOptions = [{ id: "LEO", label: "LEO", count: EVOBIKE_DATA.SALES.filter(s => s.branch === "LEO").length },
                         { id: "AV135", label: "AV135", count: EVOBIKE_DATA.SALES.filter(s => s.branch === "AV135").length }];
  const sellerOptions = SELLERS_LIST.map(s => ({ id: s, label: s, count: EVOBIKE_DATA.SALES.filter(x => x.seller === s).length }));
  const methodOptions = METHODS_LIST.map(m => ({ id: m, label: m }));
  const typeOptions = TYPES_LIST.map(t => ({ id: t, label: t === "Producto" ? "Producto" : t === "Servicio" ? "Servicio taller" : "Montaje" }));

  return (
    <div style={{ display: "flex", flexDirection: "column", gap: "1rem", paddingBottom: "2rem" }}>
      <DetailHeader
        title="Ventas e ingresos"
        subtitle="Tickets emitidos, ingreso neto y método de pago del período. Drill a día, vendedor o ticket individual."
        onExport={onExport}
        onSave={onSave}
        dirty={dirty}
      />

      {/* Filter panel */}
      <div style={{ padding: "0 1.5rem" }}>
        <FilterPanel onClear={clearAll} onSave={onSave} dirty={dirty}>
          <div className="segmented">
            {["Hoy", "7D", "MTD", "30D", "YTD"].map(p => (
              <button key={p} onClick={() => setPeriod(p)}
                className={`segmented__btn ${period === p ? "segmented__btn--active" : ""}`}>{p}</button>
            ))}
          </div>
          <FilterPopover label="Sucursal" options={branchOptions} selected={branches} onChange={setBranches} />
          <FilterPopover label="Vendedor" options={sellerOptions} selected={sellers} onChange={setSellers} />
          <FilterPopover label="Método" options={methodOptions} selected={methods} onChange={setMethods} />
          <FilterPopover label="Tipo" options={typeOptions} selected={types} onChange={setTypes} />
          {focusedDay != null && (
            <span style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "0.35rem 0.7rem", borderRadius: 999, fontSize: "0.75rem", background: "var(--p-container)", color: "var(--on-p-container)" }}>
              <Icon name="calendar" size={12} /> Día {focusedDay} abr
              <button onClick={() => setFocusedDay(null)} style={{ marginLeft: 4 }}><Icon name="close" size={12} /></button>
            </span>
          )}
        </FilterPanel>
      </div>

      {/* 5 KPIs horizontales */}
      <div style={{ padding: "0 1.5rem", display: "grid", gridTemplateColumns: "repeat(5, 1fr)", gap: "0.85rem" }}>
        <DetailKPI label="Tickets emitidos" value={fmtNum(tickets)} delta={0.089} sparkData={daily.map(d => ({ x: d.day, y: d.total > 0 ? 1 : 0 }))} />
        <DetailKPI label="Ingreso neto" value={fmtMXN(ingresoNeto)} delta={crecimiento} sparkData={daily.map(d => ({ x: d.day, y: d.total }))} />
        <DetailKPI label="Ticket promedio" value={fmtMXN(ticketPromedio)} delta={0.032} deltaLabel="Sin outliers" />
        <DetailKPI label="Unidades vendidas" value={fmtNum(unidades)} delta={0.112} deltaLabel="Solo productos" />
        <DetailKPI label="Crecimiento vs. mar" value={crecimiento != null ? fmtDelta(crecimiento) : "—"} delta={crecimiento} deltaLabel="Período comparable" />
      </div>

      {/* Viz principal */}
      <div style={{ padding: "0 1.5rem" }}>
        <div className="card" style={{ padding: "1.25rem", display: "flex", flexDirection: "column", gap: "1rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", flexWrap: "wrap", gap: "0.5rem" }}>
            <div>
              <h2 style={{ margin: 0, fontSize: "1.0625rem", fontWeight: 600, letterSpacing: "-0.01em" }}>Tendencia de ingresos</h2>
              <div style={{ fontSize: "0.75rem", color: "var(--on-surf-var)", marginTop: 2 }}>
                Ingreso neto por {granularity === "day" ? "día" : "semana"} · barras apiladas por método de pago
              </div>
            </div>
            <div style={{ display: "flex", gap: "0.4rem", alignItems: "center" }}>
              <div className="segmented">
                {[{k:"day", l:"Por día"},{k:"week", l:"Por semana"},{k:"month", l:"Por mes"}].map(o => (
                  <button key={o.k} onClick={() => setGranularity(o.k)}
                    disabled={o.k === "month"}
                    className={`segmented__btn ${granularity === o.k ? "segmented__btn--active" : ""}`}
                    style={{ opacity: o.k === "month" ? 0.4 : 1 }}>{o.l}</button>
                ))}
              </div>
            </div>
          </div>

          {/* Chart: stacked bars */}
          <V1StackedChart data={chartData} granularity={granularity} onFocusDay={granularity === "day" ? setFocusedDay : null} focusedDay={focusedDay} />

          {/* Legend */}
          <div style={{ display: "flex", gap: "1rem", flexWrap: "wrap", paddingTop: "0.5rem", borderTop: "1px solid var(--ghost-border)" }}>
            {[
              { label: "Efectivo", color: "#1b4332" },
              { label: "Tarjeta", color: "#2ECC71" },
              { label: "Transferencia", color: "#52B788" },
              { label: "ATRATO", color: "#95D5B2" },
            ].map(l => {
              const total = chartData.reduce((a, d) => a + (d[l.label] || 0), 0);
              const pct = ingresoNeto ? (total / ingresoNeto) * 100 : 0;
              return (
                <div key={l.label} style={{ display: "flex", alignItems: "center", gap: 8, fontSize: "0.75rem" }}>
                  <span style={{ width: 10, height: 10, borderRadius: 3, background: l.color }} />
                  <span style={{ fontWeight: 500 }}>{l.label}</span>
                  <span style={{ color: "var(--on-surf-var)", fontVariantNumeric: "tabular-nums" }}>{fmtMXN(total, { compact: true })} · {pct.toFixed(1)}%</span>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Tabla */}
      <div style={{ padding: "0 1.5rem" }}>
        <div className="card" style={{ padding: 0, overflow: "hidden" }}>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "0.9rem 1.25rem", gap: "0.5rem", flexWrap: "wrap" }}>
            <div style={{ display: "flex", gap: "0.5rem", alignItems: "baseline" }}>
              <h3 style={{ margin: 0, fontSize: "0.9375rem", fontWeight: 600, letterSpacing: "-0.005em" }}>Tickets del período</h3>
              <span style={{ fontSize: "0.75rem", color: "var(--on-surf-var)", fontVariantNumeric: "tabular-nums" }}>{fmtNum(sortedRows.length)} registros</span>
            </div>
            <div style={{ display: "flex", gap: "0.4rem", alignItems: "center" }}>
              <div className="input" style={{ display: "inline-flex", alignItems: "center", gap: 6, padding: "0.3rem 0.7rem", width: 220 }}>
                <Icon name="search" size={12} style={{ color: "var(--on-surf-var)" }} />
                <input value={tableQuery} onChange={e => setTableQuery(e.target.value)}
                  placeholder="folio, cliente, producto…"
                  style={{ background: "transparent", border: "none", outline: "none", flex: 1, fontSize: "0.75rem", color: "var(--on-surf)" }} />
              </div>
            </div>
          </div>
          <div style={{ overflowX: "auto" }}>
            <table className="tbl">
              <thead>
                <tr>
                  <SortableTH col="date" label="Fecha" {...{sortBy, sortDir, toggleSort}} pad="1.25rem" />
                  <SortableTH col="folio" label="Folio" {...{sortBy, sortDir, toggleSort}} />
                  <SortableTH col="customer" label="Cliente" {...{sortBy, sortDir, toggleSort}} />
                  <th>Vendedor</th>
                  <th>Tipo</th>
                  <th>Método</th>
                  <SortableTH col="total" label="Total" {...{sortBy, sortDir, toggleSort}} align="right" />
                  <SortableTH col="margin" label="Margen" {...{sortBy, sortDir, toggleSort}} align="right" pad="1.25rem" />
                </tr>
              </thead>
              <tbody>
                {sortedRows.slice(0, 50).map(t => (
                  <tr key={t.folio} onClick={() => setSelectedTicket(t)} style={{ cursor: "pointer" }}>
                    <td style={{ paddingLeft: "1.25rem", color: "var(--on-surf-var)", whiteSpace: "nowrap", fontVariantNumeric: "tabular-nums" }}>{fmtDate(t.date)}</td>
                    <td style={{ fontFamily: "var(--font-mono, ui-monospace, monospace)", fontSize: "0.75rem", color: "var(--p)" }}>{t.folio}</td>
                    <td>
                      <div style={{ fontWeight: 500 }}>{t.customer}</div>
                      <div style={{ fontSize: "0.6875rem", color: "var(--on-surf-var)", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis", maxWidth: 260 }}>{t.product}</div>
                    </td>
                    <td style={{ whiteSpace: "nowrap" }}>{t.seller}</td>
                    <td>
                      <Chip kind={t.tipo === "Servicio" ? "primary" : t.tipo === "Montaje" ? "warn" : "neutral"}>
                        {t.tipo === "Servicio" ? "Servicio" : t.tipo}
                      </Chip>
                    </td>
                    <td><span style={{ fontSize: "0.75rem", color: "var(--on-surf-var)" }}>{t.payment}</span></td>
                    <td style={{ textAlign: "right", fontVariantNumeric: "tabular-nums", fontWeight: 600 }}>{fmtMXN(t.total)}</td>
                    <td style={{ textAlign: "right", fontVariantNumeric: "tabular-nums", color: "var(--sec)", paddingRight: "1.25rem" }}>{fmtPct(t.margin / t.total, 1)}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          {sortedRows.length === 0 && (
            <EmptyTable onClear={clearAll} />
          )}
          {sortedRows.length > 50 && (
            <div style={{ padding: "0.75rem 1.25rem", borderTop: "1px solid var(--ghost-border)", fontSize: "0.75rem", color: "var(--on-surf-var)", textAlign: "center" }}>
              Mostrando 50 de {fmtNum(sortedRows.length)} · paginación en implementación
            </div>
          )}
        </div>
      </div>

      {/* Drill modal */}
      {selectedTicket && (
        <TicketDetailModal ticket={selectedTicket} onClose={() => setSelectedTicket(null)} />
      )}
    </div>
  );
};

const SortableTH = ({ col, label, sortBy, sortDir, toggleSort, align, pad }) => (
  <th onClick={() => toggleSort(col)}
    style={{ cursor: "pointer", textAlign: align, paddingLeft: pad, paddingRight: pad, color: sortBy === col ? "var(--p)" : undefined, whiteSpace: "nowrap" }}>
    {label} {sortBy === col ? (sortDir === "desc" ? "↓" : "↑") : ""}
  </th>
);

const EmptyTable = ({ onClear }) => (
  <div style={{ padding: "3rem 2rem", textAlign: "center", display: "flex", flexDirection: "column", alignItems: "center", gap: "0.65rem" }}>
    <div style={{ width: 44, height: 44, borderRadius: "50%", background: "var(--surf-high)", display: "grid", placeItems: "center" }}>
      <Icon name="search" size={18} style={{ color: "var(--on-surf-var)" }} />
    </div>
    <div style={{ fontSize: "0.9375rem", fontWeight: 600 }}>Sin tickets en este rango</div>
    <div style={{ fontSize: "0.8125rem", color: "var(--on-surf-var)", maxWidth: 360 }}>Prueba ampliar el rango, quitar filtros o cambiar de sucursal.</div>
    <button onClick={onClear} className="btn btn--sm btn--secondary" style={{ marginTop: "0.4rem" }}>Limpiar filtros</button>
  </div>
);

// ---- V1 stacked chart: barras apiladas por método + línea de total ----
const V1StackedChart = ({ data, granularity, onFocusDay, focusedDay }) => {
  const [hover, setHover] = React.useState(null);
  const W = 920, H = 280, PAD_L = 48, PAD_R = 20, PAD_T = 16, PAD_B = 36;
  const innerW = W - PAD_L - PAD_R, innerH = H - PAD_T - PAD_B;
  const maxY = Math.max(1, ...data.map(d => d.total));
  const barW = innerW / data.length * 0.68;
  const gap = innerW / data.length - barW;

  const COLORS = { Efectivo: "#1b4332", Tarjeta: "#2ECC71", Transferencia: "#52B788", ATRATO: "#95D5B2" };
  const stackOrder = ["Efectivo", "Tarjeta", "Transferencia", "ATRATO"];

  // Line total
  const linePoints = data.map((d, i) => {
    const x = PAD_L + i * (innerW / data.length) + (innerW / data.length) / 2;
    const y = PAD_T + innerH - (d.total / maxY) * innerH;
    return [x, y];
  });
  const linePath = linePoints.map((p, i) => `${i === 0 ? "M" : "L"} ${p[0]} ${p[1]}`).join(" ");

  // Y ticks
  const ticks = [0, 0.25, 0.5, 0.75, 1].map(t => ({ v: maxY * t, y: PAD_T + innerH - t * innerH }));

  return (
    <div style={{ position: "relative", width: "100%" }}>
      <svg viewBox={`0 0 ${W} ${H}`} style={{ width: "100%", height: "auto", overflow: "visible" }}>
        {/* Grid */}
        {ticks.map((t, i) => (
          <g key={i}>
            <line x1={PAD_L} x2={W - PAD_R} y1={t.y} y2={t.y} stroke="var(--ghost-border)" strokeDasharray={i === 0 ? "0" : "2 4"} />
            <text x={PAD_L - 8} y={t.y + 3} textAnchor="end" fontSize="10" fill="var(--on-surf-var)" style={{ fontVariantNumeric: "tabular-nums" }}>
              {t.v === 0 ? "0" : fmtMXN(t.v, { compact: true })}
            </text>
          </g>
        ))}

        {/* Stacked bars */}
        {data.map((d, i) => {
          const xBase = PAD_L + i * (innerW / data.length) + gap / 2;
          let yCursor = PAD_T + innerH;
          const isHover = hover === i;
          const isFocused = granularity === "day" && focusedDay === d.day;
          return (
            <g key={i}>
              {stackOrder.map(k => {
                const v = d[k] || 0;
                const h = (v / maxY) * innerH;
                yCursor -= h;
                return (
                  <rect key={k} x={xBase} y={yCursor} width={barW} height={h}
                    fill={COLORS[k]}
                    opacity={isFocused ? 1 : isHover ? 0.95 : 0.85} rx={1.5}
                  />
                );
              })}
              {/* Hover + click capture */}
              <rect x={xBase - gap / 4} y={PAD_T} width={barW + gap / 2} height={innerH}
                fill="transparent"
                onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}
                onClick={() => onFocusDay && onFocusDay(isFocused ? null : d.day)}
                style={{ cursor: onFocusDay ? "pointer" : "default" }}
              />
              {isFocused && (
                <rect x={xBase - 2} y={PAD_T - 4} width={barW + 4} height={innerH + 8}
                  fill="none" stroke="var(--p-bright)" strokeWidth={1.5} strokeDasharray="3 3" rx={2} pointerEvents="none" />
              )}
            </g>
          );
        })}

        {/* Total line overlay */}
        <path d={linePath} stroke="var(--p-bright)" strokeWidth="1.5" fill="none" opacity={0.75} />
        {linePoints.map(([x, y], i) => (
          <circle key={i} cx={x} cy={y} r={hover === i ? 4 : 2.5} fill="var(--p-bright)" stroke="var(--surf-bright)" strokeWidth="1.5" />
        ))}

        {/* X labels */}
        {data.map((d, i) => {
          if (granularity === "day" && data.length > 10 && i % 3 !== 0) return null;
          const x = PAD_L + i * (innerW / data.length) + (innerW / data.length) / 2;
          return (
            <text key={i} x={x} y={H - 12} textAnchor="middle" fontSize="10" fill="var(--on-surf-var)">
              {granularity === "day" ? d.day : d.day}
            </text>
          );
        })}
      </svg>

      {hover != null && data[hover] && (
        <div style={{
          position: "absolute", left: `${((PAD_L + hover * (innerW / data.length) + (innerW / data.length) / 2) / W) * 100}%`,
          top: 0, transform: "translate(-50%, -4px)", pointerEvents: "none",
          background: "color-mix(in srgb, var(--surf-bright) 95%, transparent)",
          backdropFilter: "blur(20px)", WebkitBackdropFilter: "blur(20px)",
          boxShadow: "0 8px 24px rgba(0,0,0,0.15)", borderRadius: "var(--r-sm)",
          padding: "0.55rem 0.75rem", fontSize: "0.6875rem", minWidth: 140,

const TweaksPanel = ({ open, onClose, state, setState }) => {
  if (!open) return null;
  const kpiLabels = {
    ventasNetas: "Ventas netas", margenBruto: "Margen bruto",
    cxc: "Cuentas por cobrar", cxp: "Cuentas por pagar", stockCritico: "Stock crítico",

  };

    const order = [...state.kpiOrder];
    const target = idx + dir;

    [order[idx], order[target]] = [order[target], order[idx]];
    setState({ ...state, kpiOrder: order });
  };

  return (
    <div style={{ position: "fixed", bottom: 20, right: 20, width: 340, zIndex: 70 }} className="fade-in">
      <div style={{

          <button className="btn btn--icon" onClick={onClose}><Icon name="close" size={14} /></button>
        </div>
        <div style={{ padding: "0 1.15rem 1.15rem", display: "flex", flexDirection: "column", gap: "1rem" }}>
          <TweakGroup title="Variante del dashboard">
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: "0.35rem" }}>
              {[
                { id: "editorial", label: "Editorial", sub: "Linear" },

                { id: "mercury", label: "Mercury", sub: "Modular" },
              ].map(v => (
                <button key={v.id} onClick={() => setState({ ...state, variant: v.id })} style={{
                  padding: "0.55rem 0.4rem", borderRadius: "var(--r-md)",
                  background: state.variant === v.id ? "var(--surf-high)" : "var(--surf-lowest)",
                  outline: state.variant === v.id ? "2px solid var(--p-bright)" : "1px solid var(--ghost-border)",
                  textAlign: "center",
                }}>

          <TweakGroup title="Modo">
            <div className="segmented" style={{ width: "100%" }}>
              <button onClick={() => setState({ ...state, dark: false })}
                className={`segmented__btn ${!state.dark ? "segmented__btn--active" : ""}`}
                style={{ flex: 1 }}>
                <Icon name="sun" size={12} /> Light
              </button>
              <button onClick={() => setState({ ...state, dark: true })}
                className={`segmented__btn ${state.dark ? "segmented__btn--active" : ""}`}
                style={{ flex: 1 }}>
                <Icon name="moon" size={12} /> Dark
              </button>
            </div>
          </TweakGroup>

          <TweakGroup title="Densidad">
            <div className="segmented" style={{ width: "100%" }}>
              {["compact", "comfortable"].map(d => (
                <button key={d} onClick={() => setState({ ...state, density: d })}
                  className={`segmented__btn ${state.density === d ? "segmented__btn--active" : ""}`}
                  style={{ flex: 1, textTransform: "capitalize" }}>
                  {d === "compact" ? "Compacto" : "Cómodo"}

              ))}
            </div>
          </TweakGroup>

          <TweakGroup title="Gráfico por defecto">
            <div className="segmented" style={{ width: "100%" }}>
              {[{id:"line",l:"Línea"},{id:"bars",l:"Barras"},{id:"area",l:"Área"}].map(o => (
                <button key={o.id} onClick={() => setState({ ...state, chartDefault: o.id })}
                  className={`segmented__btn ${state.chartDefault === o.id ? "segmented__btn--active" : ""}`}
                  style={{ flex: 1 }}>
                  {o.l}
                </button>
              ))}
            </div>
          </TweakGroup>

          <TweakGroup title="Orden de KPIs">
            <div style={{ display: "flex", flexDirection: "column", gap: 4 }}>
              {state.kpiOrder.map((id, i) => (
                <div key={id} style={{
                  display: "flex", alignItems: "center", gap: "0.5rem",

                    <Icon name={visible ? "eye" : "eyeOff"} size={12} style={{ color: visible ? "var(--p)" : "var(--on-surf-var)" }} />
                    <span style={{ flex: 1, fontSize: "0.75rem", textAlign: "left" }}>{label}</span>
                  </button>
                );
              })}
            </div>
          </TweakGroup>
        </div>
      </div>
    </div>
  );
};

      "chartDefault": "line"
    }/*EDITMODE-END*/;

    const DEFAULT_KPI_ORDER = ["ventasNetas", "margenBruto", "cxc", "cxp", "stockCritico"];
    const DEFAULT_SECTIONS = { hero: true, trend: true, branches: true, products: true, alerts: true, lowstock: true, reports: true };

    function App() {
      const [tweaksOpen, setTweaksOpen] = React.useState(false);
      const [exportOpen, setExportOpen] = React.useState(false);
      const [thresholdsOpen, setThresholdsOpen] = React.useState(false);
      const [sidebarCollapsed, setSidebarCollapsed] = React.useState(false);
      const [route, setRoute] = React.useState(() => {
        try { return JSON.parse(localStorage.getItem("evo_route")) || { name: "dashboard" }; }
        catch { return { name: "dashboard" }; }
      });
      const [branch, setBranch] = React.useState("all");
      const [period, setPeriod] = React.useState("MTD");

      const [tweaks, setTweaks] = React.useState(() => {
        try {
          const saved = JSON.parse(localStorage.getItem("evo_tweaks"));
          return { ...TWEAK_DEFAULTS, kpiOrder: DEFAULT_KPI_ORDER, sections: DEFAULT_SECTIONS, ...saved };
        } catch {
          return { ...TWEAK_DEFAULTS, kpiOrder: DEFAULT_KPI_ORDER, sections: DEFAULT_SECTIONS };
        }
      });

      React.useEffect(() => {
        localStorage.setItem("evo_route", JSON.stringify(route));
      }, [route]);
      React.useEffect(() => {
        localStorage.setItem("evo_tweaks", JSON.stringify(tweaks));
      }, [tweaks]);

      React.useEffect(() => {
        document.documentElement.classList.toggle("dark", tweaks.dark);
        document.documentElement.classList.toggle("density-compact", tweaks.density === "compact");
      }, [tweaks.dark, tweaks.density]);

      // Edit mode protocol
      React.useEffect(() => {
        const handler = (e) => {
          if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
          if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
        };
        window.addEventListener("message", handler);
        window.parent.postMessage({ type: "__edit_mode_available" }, "*");
        return () => window.removeEventListener("message", handler);
      }, []);

      return (
        <div style={{ display: "flex", minHeight: "100vh", background: "var(--surface)" }}>
          <Sidebar collapsed={sidebarCollapsed} onToggle={() => setSidebarCollapsed(!sidebarCollapsed)} />
          <main style={{ flex: 1, minWidth: 0, display: "flex", flexDirection: "column" }}
                data-screen-label={route.name === "dashboard" ? "01 Dashboard" : route.name === "list" ? "02 Catálogo" : route.name === "detail" ? "03 Detalle" : "04 Builder"}>
            <Topbar branch={branch} setBranch={setBranch}
                    dark={tweaks.dark} setDark={(d) => setTweaks({ ...tweaks, dark: d })}
                    onOpenTweaks={() => setTweaksOpen(true)}
                    route={route} setRoute={setRoute}
                    period={period} setPeriod={setPeriod} />
            <PageHeader route={route} setRoute={setRoute} period={period} setPeriod={setPeriod}
                        onExport={() => setExportOpen(true)} branch={branch} />

            {route.name === "dashboard" && (
              <Dashboard branch={branch}
                         kpiOrder={tweaks.kpiOrder}
                         kpiVisibility={{}}
                         sections={tweaks.sections}
                         variant={tweaks.variant}
                         chartDefault={tweaks.chartDefault}
                         onOpenThresholds={() => setThresholdsOpen(true)}
                         setRoute={setRoute} />
            )}
            {route.name === "list" && <ReportsList setRoute={setRoute} onExport={() => setExportOpen(true)} />}
            {route.name === "detail" && route.report?.id === "ventas" && (
              <ReporteVentasVendedor onExport={() => setExportOpen(true)} />
            )}
            {route.name === "detail" && route.report?.id !== "ventas" && <ReportDetail report={route.report} branch={branch}
                                                      onExport={() => setExportOpen(true)}
                                                      onOpenThresholds={() => setThresholdsOpen(true)} />}
            {route.name === "builder" && <Builder setRoute={setRoute} />}
          </main>

          <ExportDrawer open={exportOpen} onClose={() => setExportOpen(false)} />
          <ThresholdsModal open={thresholdsOpen} onClose={() => setThresholdsOpen(false)} />
          <TweaksPanel open={tweaksOpen} onClose={() => setTweaksOpen(false)}
                       state={tweaks} setState={setTweaks} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  
  </script>
</body>
</html>
